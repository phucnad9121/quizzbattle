name: quizbattle
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  # Dev tools
  - pip:
      # Web framework
      - fastapi==0.111.0
      - uvicorn[standard]==0.30.1
      - websockets==12.0

      # Database
      - sqlalchemy[asyncio]==2.0.30
      - asyncpg==0.29.0
      - alembic==1.13.1
      - psycopg2-binary==2.9.9     # alembic CLI cần sync driver

      # Redis
      - redis[hiredis]==5.0.4
      - aioredis==2.0.1

      # Auth
      - python-jose[cryptography]==3.3.0
      - passlib[bcrypt]==1.7.4
      - python-multipart==0.0.9

      # Validation / Config
      - pydantic==2.7.1
      - pydantic-settings==2.2.1
      - python-dotenv==1.0.1

      # Utils
      - httpx==0.27.0
      - email-validator==2.1.1

      # Dev / Test
      - pytest==8.2.0
      - pytest-asyncio==0.23.6
      - httpx==0.27.0
      - faker==25.0.0
      - black==24.4.2
      - ruff==0.4.4
      - mypy==1.10.0
      - pandas==2.2.2
      - openpyxl==3.1.2
      - python-docx==1.1.0