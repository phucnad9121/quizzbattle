version: "3.9"

services:
  # ─── PostgreSQL ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: quizbattle_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quizbattle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-quizbattle_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quizbattle}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: quizbattle_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redissecret} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redissecret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (FastAPI) ───────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quizbattle_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-quizbattle}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-quizbattle_db}
      SYNC_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-quizbattle}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-quizbattle_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redissecret}@redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-supersecretkey}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
#    volumes:
#      - ./backend:/app
#    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Frontend (Next.js) ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quizbattle_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      NEXT_DISABLE_TURBOPACK: "1"
    ports:
      - "3000:3000"
    depends_on:
      - backend
#    volumes:
#      - ./frontend:/app
#      - /app/node_modules
#    command: npm run dev

volumes:
  postgres_data:
  redis_data: